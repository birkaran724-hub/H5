<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Hand Laser FX</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#000;overflow:hidden}
  #canvas{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:1}
  #hud{position:fixed;top:12px;left:12px;z-index:2;font-family:monospace;display:flex;flex-direction:column;gap:6px}
  .s{background:rgba(0,0,0,0.7);border:1px solid #0f0;color:#0f0;font-size:12px;padding:5px 10px}
  #overlay{position:fixed;inset:0;background:#000;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;color:#fff;font-size:14px;font-family:monospace;text-align:center;padding:20px}
  #startBtn{padding:16px 40px;background:#ff0000;border:none;color:#fff;font-size:18px;font-family:monospace;cursor:pointer;border-radius:6px}
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="hud">
  <div class="s" id="sh">Hands: 0</div>
  <div class="s" id="sf">FPS: -</div>
  <div class="s" id="sd">waiting...</div>
</div>
<div id="overlay">
  <div id="msg">Tap START</div>
  <button id="startBtn" onclick="startCamera()">START</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/hand-pose-detection@2.0.1/dist/hand-pose-detection.min.js"></script>
<script>
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
const overlay=document.getElementById('overlay');
const sh=document.getElementById('sh');
const sf=document.getElementById('sf');
const sd=document.getElementById('sd');
const msg=document.getElementById('msg');

const video=document.createElement('video');
video.autoplay=true; video.muted=true; video.playsInline=true;

let detector=null,running=false,fc=0,lastT=performance.now();

function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
window.addEventListener('resize',resize);resize();

// Extract x,y safely — TFJS returns different formats on different platforms
function getXY(kp){
  // Could be {x,y}, or {x,y,z}, or array [x,y,z]
  if(Array.isArray(kp)) return {x:kp[0],y:kp[1]};
  if(typeof kp.x==='number' && !isNaN(kp.x)) return {x:kp.x,y:kp.y};
  // Sometimes nested under .position
  if(kp.position) return {x:kp.position.x,y:kp.position.y};
  return null;
}

const COLORS=['#ff00ff','#00ffff','#ffff00','#ff4444','#00ff88','#ff8800','#cc88ff','#ffffff'];
const TIPS=[4,8,12,16,20];

function drawHand(kps, dw, dh, dx, dy, vw, vh){
  // Convert keypoint to canvas coords (mirrored)
  function toC(kp){
    const p=getXY(kp);
    if(!p) return null;
    const mx=1-(p.x/vw);
    return {x:dx+mx*dw, y:dy+(p.y/vh)*dh};
  }

  const tips=TIPS.map(i=>toC(kps[i])).filter(Boolean);
  const wrist=toC(kps[0]);
  if(!wrist||tips.length===0) return;

  // Fan lines wrist -> tips
  tips.forEach((t,i)=>{
    ctx.beginPath();
    ctx.moveTo(wrist.x,wrist.y);
    ctx.lineTo(t.x,t.y);
    ctx.strokeStyle=COLORS[i];
    ctx.lineWidth=6;
    ctx.shadowColor=COLORS[i];
    ctx.shadowBlur=25;
    ctx.lineCap='round';
    ctx.globalAlpha=1;
    ctx.stroke();
    // white core
    ctx.beginPath();
    ctx.moveTo(wrist.x,wrist.y);
    ctx.lineTo(t.x,t.y);
    ctx.strokeStyle='#ffffff';
    ctx.lineWidth=2;
    ctx.shadowBlur=0;
    ctx.stroke();
  });

  // Tip-to-tip ring
  for(let i=0;i<tips.length-1;i++){
    ctx.beginPath();
    ctx.moveTo(tips[i].x,tips[i].y);
    ctx.lineTo(tips[i+1].x,tips[i+1].y);
    ctx.strokeStyle=COLORS[(i+3)%8];
    ctx.lineWidth=4;
    ctx.shadowColor=COLORS[(i+3)%8];
    ctx.shadowBlur=20;
    ctx.stroke();
  }

  // Cross diagonals
  [[0,2],[1,3],[0,4],[2,4]].forEach(([a,b],i)=>{
    if(!tips[a]||!tips[b]) return;
    ctx.beginPath();
    ctx.moveTo(tips[a].x,tips[a].y);
    ctx.lineTo(tips[b].x,tips[b].y);
    ctx.strokeStyle=COLORS[(i+5)%8];
    ctx.lineWidth=3;
    ctx.shadowColor=COLORS[(i+5)%8];
    ctx.shadowBlur=18;
    ctx.stroke();
  });

  // Glow dots
  [wrist,...tips].forEach((p,i)=>{
    const col=i===0?'#fff':COLORS[i-1];
    ctx.beginPath();
    ctx.arc(p.x,p.y,i===0?8:6,0,Math.PI*2);
    ctx.fillStyle=col;
    ctx.shadowColor=col;
    ctx.shadowBlur=20;
    ctx.globalAlpha=1;
    ctx.fill();
  });

  ctx.shadowBlur=0;
}

async function loop(){
  if(!running) return;
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
  const cw=canvas.width,ch=canvas.height;

  // Draw video
  const vw=video.videoWidth||640,vh=video.videoHeight||480;
  const vr=vw/vh,cr=cw/ch;
  let dw,dh,dx,dy;
  if(vr>cr){dh=ch;dw=ch*vr;dx=(cw-dw)/2;dy=0;}
  else{dw=cw;dh=cw/vr;dx=0;dy=(ch-dh)/2;}

  if(video.readyState>=2){
    ctx.save();
    ctx.translate(cw,0);ctx.scale(-1,1);
    ctx.drawImage(video,cw-dx-dw,dy,dw,dh);
    ctx.restore();
  }

  // Detect hands
  let hands=[];
  if(video.readyState>=2&&detector){
    try{hands=await detector.estimateHands(video,{flipHorizontal:false});}catch(e){}
  }

  sh.textContent='Hands: '+hands.length;

  if(hands.length>0){
    const kps=hands[0].keypoints;
    // Debug: show what the first keypoint looks like
    const first=kps[0];
    sd.textContent=`kp0: ${JSON.stringify(first).slice(0,40)}`;
    hands.forEach(h=>drawHand(h.keypoints,dw,dh,dx,dy,vw,vh));
  } else {
    sd.textContent='No hands detected';
  }

  fc++;
  const now=performance.now();
  if(now-lastT>800){
    sf.textContent='FPS: '+Math.round(fc/((now-lastT)/1000));
    fc=0;lastT=now;
  }
  requestAnimationFrame(loop);
}

async function startCamera(){
  msg.textContent='Starting camera...';
  document.getElementById('startBtn').style.display='none';
  try{
    const stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:'user',width:{ideal:640},height:{ideal:480}}
    });
    video.srcObject=stream;
    await new Promise(r=>{video.onloadedmetadata=r;});
    video.play();
    msg.textContent='Loading model... (~10 sec)';
    detector=await handPoseDetection.createDetector(
      handPoseDetection.SupportedModels.MediaPipeHands,
      {runtime:'tfjs',modelType:'lite',maxHands:2}
    );
    overlay.style.display='none';
    running=true;
    loop();
  }catch(e){
    msg.textContent='ERROR: '+e.message;
    msg.style.color='#f00';
    document.getElementById('startBtn').style.display='block';
    document.getElementById('startBtn').textContent='RETRY';
  }
}
</script>
</body>
</html>
